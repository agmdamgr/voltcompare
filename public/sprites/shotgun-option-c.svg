<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <!-- TOP BARREL -->
  <rect x="5" y="20" width="100" height="9" rx="2" fill="#2D3436"/>
  <!-- BOTTOM BARREL -->
  <rect x="5" y="32" width="100" height="9" rx="2" fill="#2D3436"/>
  <!-- BARREL RIB (vent rib between barrels & on top) -->
  <rect x="14" y="19" width="88" height="3" rx="1" fill="#636E72"/>
  <rect x="14" y="29" width="88" height="3" rx="1" fill="#636E72"/>
  <!-- MUZZLE ENDS (combined) -->
  <rect x="5" y="18" width="10" height="25" rx="3" fill="#2D3436"/>
  <!-- BEAD SIGHT (front) -->
  <circle cx="16" cy="21" r="2.2" fill="#B2BEC3"/>
  <!-- BARREL HIGHLIGHT (subtle shine) -->
  <line x1="15" y1="21" x2="103" y2="21" stroke="#636E72" stroke-width="0.8"/>
  <line x1="15" y1="33" x2="103" y2="33" stroke="#636E72" stroke-width="0.8"/>
  <!-- HINGE BLOCK (mono-bloc where barrels meet receiver) -->
  <rect x="102" y="17" width="14" height="30" rx="2" fill="#4A4A4A"/>
  <!-- RECEIVER (rounded, traditional SxS/O/U profile) -->
  <rect x="113" y="18" width="36" height="28" rx="5" fill="#636E72"/>
  <!-- RECEIVER ENGRAVING PANEL (decorative) -->
  <rect x="117" y="22" width="28" height="18" rx="3" fill="#707070"/>
  <!-- Engraving detail (simple crosshatch) -->
  <line x1="120" y1="24" x2="142" y2="38" stroke="#636E72" stroke-width="0.8"/>
  <line x1="125" y1="22" x2="144" y2="36" stroke="#636E72" stroke-width="0.8"/>
  <line x1="120" y1="32" x2="138" y2="22" stroke="#636E72" stroke-width="0.8"/>
  <!-- TOP LEVER (break-action opening lever) -->
  <path d="M124 18 L134 18 L136 12 L126 10 Z" fill="#2D3436"/>
  <rect x="127" y="10" width="6" height="4" rx="1" fill="#4A4A4A"/>
  <!-- EXPOSED HAMMERS (decorative - sidelock style) -->
  <path d="M118 18 L126 18 L128 13 L122 11 L118 14 Z" fill="#2D3436"/>
  <path d="M131 18 L139 18 L141 13 L135 11 L131 14 Z" fill="#2D3436"/>
  <!-- TRIGGER GUARD (classic oval, gold-colored) -->
  <path d="M116 46 Q127 60 143 46" fill="none" stroke="#A0845C" stroke-width="3"/>
  <!-- FRONT TRIGGER -->
  <rect x="123" y="39" width="3" height="13" rx="1" fill="#B2BEC3"/>
  <!-- REAR TRIGGER (select-fire / barrel choice) -->
  <rect x="131" y="39" width="3" height="13" rx="1" fill="#B2BEC3"/>
  <!-- STOCK WRIST / NECK (where stock meets receiver) -->
  <rect x="147" y="22" width="10" height="24" rx="2" fill="#795548"/>
  <!-- STOCK (classic English/Bavarian style, with slight rise) -->
  <path d="M155 22 L208 18 L214 34 L208 50 L155 46 Z" fill="#795548"/>
  <!-- CHEEK PIECE (raised, classic) -->
  <path d="M162 20 L202 18 L202 26 L162 28 Z" fill="#A1887F"/>
  <!-- BUTTPLATE (decorative) -->
  <rect x="210" y="18" width="6" height="33" rx="2" fill="#2D3436"/>
  <line x1="213" y1="21" x2="213" y2="49" stroke="#4A4A4A" stroke-width="1"/>
  <!-- Wood grain -->
  <line x1="164" y1="21" x2="206" y2="19" stroke="#BCAAA4" stroke-width="0.8"/>
  <line x1="162" y1="36" x2="202" y2="42" stroke="#5D4037" stroke-width="0.8"/>
</svg>