  <path d="M86 50 L104 50 L106 67 L88 67 Z" fill="#2D3436"/>
  <line x1="90" y1="55" x2="102" y2="55" stroke="#636E72" stroke-width="1"/>
  <line x1="90" y1="60" x2="102" y2="60" stroke="#636E72" stroke-width="1"/>
  <!-- PISTOL GRIP (polymer/tactical) -->
  <path d="M116 50 L126 50 L128 64 L120 66 L114 57 Z" fill="#1E1E1E"/>
