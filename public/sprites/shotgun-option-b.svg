<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <!-- BARREL (short tactical barrel) -->
  <rect x="5" y="29" width="80" height="10" rx="2" fill="#2D3436"/>
