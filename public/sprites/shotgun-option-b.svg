  <rect x="100" y="43" width="3" height="12" rx="1" fill="#B2BEC3"/>
  <!-- FOLDING/COLLAPSIBLE STOCK (skeletal open) -->
  <!-- Top rail -->
  <rect x="127" y="21" width="68" height="5" rx="2" fill="#3D3D3D"/>
  <!-- Bottom rail -->
  <rect x="127" y="45" width="68" height="5" rx="2" fill="#3D3D3D"/>
