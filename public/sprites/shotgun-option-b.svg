  <line x1="11" y1="27" x2="11" y2="41" stroke="#636E72" stroke-width="1.2"/>
  <!-- HEAT SHIELD (over barrel) with vent holes -->
  <rect x="14" y="26" width="64" height="6" rx="1.5" fill="#4A4A4A"/>
