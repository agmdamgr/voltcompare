<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <!-- BARREL (shorter and thicker than rifle) -->
  <rect x="5" y="27" width="90" height="10" rx="2" fill="#2D3436"/>
  <!-- MUZZLE (blunt, no device) -->
  <rect x="5" y="25" width="9" height="14" rx="2.5" fill="#2D3436"/>
  <!-- TUBE MAGAZINE (runs parallel under barrel) -->
  <rect x="5" y="40" width="86" height="7" rx="3.5" fill="#636E72"/>
  <!-- CAP at tube end -->
  <ellipse cx="7" cy="43.5" rx="3" ry="5.5" fill="#4A4A4A"/>
  <!-- MAGAZINE CAP RING -->
  <rect x="83" y="40" width="6" height="7" rx="1" fill="#4A4A4A"/>
  <!-- PUMP FORE-END (distinctive sliding section, wood) -->
  <rect x="26" y="25" width="38" height="24" rx="5" fill="#8D6E63"/>
  <!-- Pump grip lines (texture) -->
  <line x1="32" y1="27" x2="32" y2="47" stroke="#BCAAA4" stroke-width="1"/>
  <line x1="38" y1="27" x2="38" y2="47" stroke="#BCAAA4" stroke-width="1"/>
  <line x1="44" y1="27" x2="44" y2="47" stroke="#BCAAA4" stroke-width="1"/>
  <line x1="50" y1="27" x2="50" y2="47" stroke="#BCAAA4" stroke-width="1"/>
  <line x1="56" y1="27" x2="56" y2="47" stroke="#BCAAA4" stroke-width="1"/>
  <!-- PUMP SLIDE RAILS (metal rails connecting pump) -->
  <rect x="20" y="38" width="52" height="3" rx="1" fill="#4A4A4A"/>
  <!-- RECEIVER (wider, beefy shotgun action) -->
  <rect x="91" y="22" width="44" height="28" rx="3" fill="#636E72"/>
  <!-- RECEIVER TOP CAP -->
  <rect x="91" y="20" width="44" height="6" rx="2" fill="#2D3436"/>
  <!-- EJECTION PORT -->
  <rect x="100" y="25" width="16" height="10" rx="1" fill="#454545"/>
  <!-- TRIGGER GUARD -->
  <path d="M95 50 Q108 64 128 50" fill="none" stroke="#4A4A4A" stroke-width="2.5"/>
  <!-- TRIGGER -->
  <rect x="108" y="43" width="3" height="12" rx="1" fill="#B2BEC3"/>
  <!-- PISTOL GRIP (wood) -->
  <path d="M126 50 L135 50 L138 64 L129 66 L124 57 Z" fill="#795548"/>
  <!-- STOCK (traditional, slightly straighter than rifle) -->
  <path d="M135 22 L202 19 L214 37 L202 52 L135 50 Z" fill="#795548"/>
  <!-- Cheek rest -->
  <path d="M147 21 L194 19 L194 27 L147 29 Z" fill="#A1887F"/>
  <!-- BUTTPLATE -->
  <rect x="211" y="19" width="6" height="34" rx="2" fill="#2D3436"/>
  <!-- Wood grain -->
  <line x1="149" y1="21" x2="199" y2="20" stroke="#BCAAA4" stroke-width="0.8"/>
  <line x1="149" y1="39" x2="197" y2="44" stroke="#5D4037" stroke-width="0.8"/>
</svg>