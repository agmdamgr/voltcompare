<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <!-- BARREL (long and thin) -->
  <rect x="5" y="30" width="130" height="7" rx="1.5" fill="#2D3436"/>
  <!-- MUZZLE DEVICE (flash hider with slots) -->
  <rect x="5" y="28" width="13" height="11" rx="2" fill="#2D3436"/>
  <line x1="9"  y1="28" x2="9"  y2="39" stroke="#636E72" stroke-width="1.2"/>
  <line x1="13" y1="28" x2="13" y2="39" stroke="#636E72" stroke-width="1.2"/>
  <!-- GAS TUBE (thin pipe above barrel) -->
  <rect x="22" y="26" width="62" height="3.5" rx="1" fill="#3D4A4D"/>
  <!-- FRONT SIGHT POST -->
  <rect x="22" y="22" width="4" height="6" rx="0.5" fill="#2D3436"/>
  <!-- HANDGUARD (rifle-style slim fore-end) -->
  <rect x="26" y="27" width="58" height="12" rx="3" fill="#795548"/>
  <line x1="35" y1="28" x2="35" y2="38" stroke="#A1887F" stroke-width="0.8"/>
  <line x1="45" y1="28" x2="45" y2="38" stroke="#A1887F" stroke-width="0.8"/>
  <line x1="55" y1="28" x2="55" y2="38" stroke="#A1887F" stroke-width="0.8"/>
  <line x1="65" y1="28" x2="65" y2="38" stroke="#A1887F" stroke-width="0.8"/>
  <!-- UPPER RECEIVER -->
  <rect x="84" y="23" width="47" height="14" rx="2" fill="#2D3436"/>
  <!-- CHARGING HANDLE -->
  <rect x="102" y="19" width="15" height="6" rx="1.5" fill="#636E72"/>
  <rect x="104" y="17" width="11" height="4" rx="1" fill="#4A4A4A"/>
  <!-- REAR SIGHT (aperture) -->
  <rect x="86" y="20" width="9" height="5" rx="1" fill="#2D3436"/>
  <rect x="88" y="21" width="5" height="3" rx="0.5" fill="#1A1A1A"/>
  <!-- LOWER RECEIVER -->
  <rect x="84" y="37" width="47" height="10" rx="2" fill="#636E72"/>
  <!-- TRIGGER GUARD -->
  <path d="M87 47 Q100 62 122 47" fill="none" stroke="#4A4A4A" stroke-width="2.5"/>
  <!-- TRIGGER -->
  <rect x="101" y="40" width="3" height="12" rx="1" fill="#B2BEC3"/>
  <!-- MAGAZINE (angled, like AR-style) -->
  <path d="M90 47 L106 47 L108 69 L92 69 Z" rx="2" fill="#2D3436"/>
  <line x1="94" y1="52" x2="104" y2="52" stroke="#636E72" stroke-width="1"/>
  <line x1="94" y1="57" x2="104" y2="57" stroke="#636E72" stroke-width="1"/>
  <line x1="94" y1="62" x2="104" y2="62" stroke="#636E72" stroke-width="1"/>
  <!-- PISTOL GRIP -->
  <path d="M122 47 L132 47 L135 62 L126 64 L120 55 Z" fill="#2D3436"/>
  <!-- STOCK (straight rifle-style) -->
  <path d="M131 23 L200 20 L213 36 L200 50 L131 48 Z" fill="#795548"/>
  <!-- Cheek weld detail -->
  <path d="M143 22 L190 20 L190 27 L143 29 Z" fill="#A1887F"/>
  <!-- BUTTPLATE -->
  <rect x="210" y="20" width="6" height="31" rx="2" fill="#2D3436"/>
  <!-- Wood grain lines -->
  <line x1="145" y1="22" x2="197" y2="21" stroke="#BCAAA4" stroke-width="0.8"/>
  <line x1="145" y1="39" x2="195" y2="42" stroke="#5D4037" stroke-width="0.8"/>
</svg>